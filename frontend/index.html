<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WalletLens — Your Wallet, in Focus.</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root { --bg:#000; --panel:#0d0d0d; --line:#262626; --line2:#3a3a3a; --txt:#ffffff; --sub:#929292; --dim:#6a6a6a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--txt); -webkit-font-smoothing:antialiased; }
    .display { font-weight:800; letter-spacing:-.035em; line-height:1.02; }
    .mono { font-family:'IBM Plex Mono',monospace; }

    .card { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:16px; transition:border-color .15s; }
    .card:hover { border-color:var(--line2); }
    .badge { display:inline-block; background:#fff; color:#000; font-weight:700; font-size:12px;
      letter-spacing:.02em; padding:7px 16px; border-radius:100px; }
    .btn { border:1px solid var(--line); border-radius:100px; font-weight:600; letter-spacing:.01em;
      transition:background .15s, border-color .15s, opacity .15s; cursor:pointer; background:var(--panel); color:var(--txt); }
    .btn:hover { border-color:var(--line2); background:#161616; }
    .btn:active { background:#1d1d1d; }
    .btn:disabled { opacity:.3; cursor:not-allowed; }
    .btn-primary { background:#fff; color:#000; border-color:#fff; }
    .btn-primary:hover { background:#e6e6e6; border-color:#e6e6e6; }

    /* staggered reveal */
    @keyframes pop { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
    .reveal .pop { opacity:0; }
    .reveal.run .pop { animation:pop .5s cubic-bezier(.2,.8,.2,1) both; }
    .reveal.run .pop:nth-child(1){animation-delay:.04s}
    .reveal.run .pop:nth-child(2){animation-delay:.10s}
    .reveal.run .pop:nth-child(3){animation-delay:.16s}
    .reveal.run .pop:nth-child(4){animation-delay:.22s}
    .reveal.run .pop:nth-child(5){animation-delay:.28s}
    .reveal.run .pop:nth-child(6){animation-delay:.34s}
    .reveal.run .pop:nth-child(7){animation-delay:.40s}
    /* score bars */
    .bar-track { background:rgba(255,255,255,.08); border-radius:100px; height:10px; overflow:hidden; }
    .bar-fill { height:100%; width:0; border-radius:100px; transition:width 1s cubic-bezier(.2,.8,.2,1); }
    /* decorative pixel-grid backgrounds (OKX block motif; html2canvas-safe) */
    .deco { position:absolute; inset:0; pointer-events:none; overflow:hidden; color:rgba(255,255,255,.05); z-index:0; }
    .deco.inkd { color:rgba(0,0,0,.06); }
    .deco::before, .deco::after { content:""; position:absolute; }
    .deco-0::before { width:420px; height:420px; top:-140px; right:-140px;
      background:conic-gradient(currentColor 0 25%, transparent 0 50%, currentColor 0 75%, transparent 0);
      background-size:64px 64px; }
    .deco-1::before { inset:0; background:radial-gradient(currentColor 1.5px, transparent 2px); background-size:32px 32px; }
    .deco-2::before { width:340px; height:340px; bottom:-120px; left:-120px;
      background:conic-gradient(currentColor 0 25%, transparent 0 50%, currentColor 0 75%, transparent 0);
      background-size:56px 56px; }
    .deco-3::before { inset:0; background:repeating-linear-gradient(0deg, currentColor 0 1px, transparent 1px 56px),
      repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 56px); }
    .deco-4::before { inset:0; background:radial-gradient(currentColor 1.5px, transparent 2px); background-size:28px 28px; }
    .deco-5::before { width:300px; height:300px; top:-100px; left:-100px;
      background:conic-gradient(currentColor 0 25%, transparent 0 50%, currentColor 0 75%, transparent 0);
      background-size:50px 50px; }
    .deco-6::before { inset:0; background:repeating-linear-gradient(0deg, currentColor 0 1px, transparent 1px 56px),
      repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 56px); }
    .deco-7::before { inset:0; background:radial-gradient(currentColor 1.5px, transparent 2px); background-size:32px 32px; }
    .deco-8::before { width:380px; height:380px; top:-130px; right:-130px;
      background:conic-gradient(currentColor 0 25%, transparent 0 50%, currentColor 0 75%, transparent 0);
      background-size:60px 60px; }
    /* marquee */
    .marquee { overflow:hidden; white-space:nowrap; border-top:1px solid var(--line); }
    .marquee > span { display:inline-block; animation:scroll 26s linear infinite; font-weight:600; font-size:12px;
      letter-spacing:.22em; text-transform:uppercase; }
    @keyframes scroll { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin .9s linear infinite; }

    /* ---- landing page ---- */
    .sec { border-bottom:1px solid var(--line); padding:110px 24px; position:relative; overflow:hidden; }
    .wrapx { max-width:1080px; margin:0 auto; position:relative; z-index:1; }
    .eyebrow { display:inline-block; font-family:'IBM Plex Mono',monospace; color:var(--sub);
      font-size:12px; font-weight:500; text-transform:uppercase; letter-spacing:.24em; margin-bottom:26px; }
    .h2 { font-weight:800; letter-spacing:-.035em; line-height:1.04;
      font-size:clamp(2.1rem,5.6vw,3.9rem); margin-bottom:22px; }
    .lede { font-size:clamp(1rem,1.9vw,1.2rem); font-weight:500; max-width:62ch; line-height:1.65; color:var(--sub); }
    .lede code, .lede strong { color:var(--txt); }

    /* scroll reveal */
    .rv { opacity:0; transform:translateY(26px); }
    .rv.seen { animation:rvin .6s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes rvin { to { opacity:1; transform:none; } }
    .rv.seen:nth-child(2){animation-delay:.06s}
    .rv.seen:nth-child(3){animation-delay:.12s}
    .rv.seen:nth-child(4){animation-delay:.18s}
    .rv.seen:nth-child(5){animation-delay:.24s}
    .rv.seen:nth-child(6){animation-delay:.30s}

    /* big cta */
    .cta { display:inline-flex; align-items:center; gap:12px; background:#fff; color:#000;
      font-weight:700; font-size:clamp(1rem,2vw,1.15rem); letter-spacing:-.01em;
      padding:18px 36px; border-radius:100px; text-decoration:none; transition:background .15s, transform .15s; }
    .cta:hover { background:#e6e6e6; transform:translateY(-1px); }
    .cta:active { transform:translateY(0); }

    /* signal chip grid */
    .sig { border:1px solid var(--line); background:var(--panel); border-radius:12px;
      padding:14px 16px; transition:border-color .15s; }
    .sig:hover { border-color:var(--line2); }
    .sig code { font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:13px; color:var(--txt); }

    /* code block */
    .codeblk { background:var(--panel); color:#e5e5e5; border:1px solid var(--line); border-radius:16px;
      font-family:'IBM Plex Mono',monospace; font-size:12.5px;
      line-height:1.7; padding:24px; overflow-x:auto; white-space:pre; }
    .codeblk .k { color:#929292; } .codeblk .s { color:#ffffff; } .codeblk .c { color:#5a5a5a; }

    /* step rail */
    .step { display:flex; gap:22px; align-items:flex-start; border-top:1px solid var(--line); padding-top:26px; }
    .step .n { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--dim); flex-shrink:0; width:52px; padding-top:6px; }
  </style>
</head>
<body>
  <div x-data="walletlens()" class="min-h-screen" :class="loading && 'flex items-center justify-center'">

    <!-- ===== LOADING ===== -->
    <template x-if="loading">
      <div class="flex flex-col items-center gap-6">
        <div class="w-14 h-14 rounded-full border-2 border-[#262626] border-t-white spin"></div>
        <p class="mono uppercase text-xs tracking-[.24em] text-[#929292]">Wrapping your wallet...</p>
      </div>
    </template>

    <!-- ===== LANDING ===== -->
    <template x-if="!loading && !wrapped">
      <div x-init="initReveal()">

        <!-- 1 · HERO -->
        <section class="sec" style="padding-top:120px">
          <div class="deco deco-0"></div>
          <div class="wrapx flex flex-col items-center text-center">
            <div class="eyebrow rv">On-chain wallet intelligence for agents</div>
            <h1 class="display rv" style="font-size:clamp(3.4rem,11vw,7.5rem);margin:6px 0 22px">WalletLens</h1>
            <p class="lede rv" style="margin-bottom:38px">
              Your agent keeps hitting addresses it knows nothing about.
              WalletLens answers <em style="color:#fff">“who is this wallet, and should I act on it?”</em>
              — as structured data it can compose, not a webpage it has to scrape.
            </p>
            <a href="https://www.okx.ai/agents/4938" target="_blank" rel="noopener" class="cta rv">
              Try WalletLens on OKX.AI <span>→</span>
            </a>
            <button @click="scrollToWrap()" class="rv mono text-xs uppercase tracking-[.2em] text-[#929292] hover:text-white transition-colors" style="margin-top:24px">
              or wrap your own wallet ↓
            </button>
            <div class="rv mono text-[11px] uppercase tracking-[.2em] text-[#6a6a6a]" style="margin-top:16px">
              Agent&nbsp;ID&nbsp;#4938 · X&nbsp;Layer · 0.05 USDT0 per call
            </div>

            <!-- live usage counters (real, from /api/stats) -->
            <div x-show="statsReady" x-transition.duration.500ms class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full" style="max-width:720px;margin-top:52px">
              <div class="card p-5">
                <p class="display" style="font-size:2rem" x-text="ds.agentCalls.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-[.18em] text-[#6a6a6a] mt-2">Tool calls by agents</p>
              </div>
              <div class="card p-5">
                <p class="display" style="font-size:2rem" x-text="ds.wraps.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-[.18em] text-[#6a6a6a] mt-2">Wallets wrapped by people</p>
              </div>
              <div class="card p-5">
                <p class="display" style="font-size:2rem" x-text="ds.uniqueWallets.toLocaleString()"></p>
                <p class="mono text-[10px] uppercase tracking-[.18em] text-[#6a6a6a] mt-2">Unique addresses profiled</p>
              </div>
            </div>
          </div>
        </section>

        <!-- ticker -->
        <div class="marquee text-[#6a6a6a]">
          <span>SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS ·&nbsp;</span><span>SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS · SCREEN COUNTERPARTIES · DETECT SYBILS · RANK WALLETS · PROFILE ANY ADDRESS ·&nbsp;</span>
        </div>

        <!-- 2 · PROBLEM -->
        <section class="sec">
          <div class="deco deco-1"></div>
          <div class="wrapx">
            <div class="eyebrow rv">The problem</div>
            <h2 class="h2 rv">An address is<br>just 42 characters.</h2>
            <p class="lede rv" style="margin-bottom:40px">
              An autonomous agent about to send funds, drop an airdrop, or trust a counterparty
              sees <code class="mono">0x8f3a…7f80</code> and nothing else. Block explorers are built
              for humans with eyes. Agents need a verdict they can justify.
            </p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="card rv p-6"><p class="display text-xl mb-2">Is it a bot?</p><p class="text-sm text-[#929292] leading-relaxed">Timing regularity, volume, night-hour skew.</p></div>
              <div class="card rv p-6"><p class="display text-xl mb-2">Is it farming?</p><p class="text-sm text-[#929292] leading-relaxed">Dust patterns, approval spam, wallet age.</p></div>
              <div class="card rv p-6"><p class="display text-xl mb-2">Is it real?</p><p class="text-sm text-[#929292] leading-relaxed">Portfolio, net worth, cross-chain history.</p></div>
            </div>
          </div>
        </section>

        <!-- 3 · WHAT YOU GET -->
        <section class="sec">
          <div class="deco deco-2"></div>
          <div class="wrapx">
            <div class="eyebrow rv">What comes back</div>
            <h2 class="h2 rv">14 signals. One verdict.<br>Always with evidence.</h2>
            <p class="lede rv" style="margin-bottom:44px">
              Every result carries <code class="mono">archetypeConfidence</code> and an
              <code class="mono">evidence</code> block — how many transactions were analyzed,
              the window, and an explicit caveat. Never a black box.
            </p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <template x-for="s in signalList" :key="s">
                <div class="sig rv"><code x-text="s"></code></div>
              </template>
            </div>
          </div>
        </section>

        <!-- 4 · TOOLS -->
        <section class="sec">
          <div class="deco deco-3"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Eleven MCP tools</div>
            <h2 class="h2 rv">Call it like<br>any other tool.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" style="margin-top:40px">
              <template x-for="t in tools" :key="t.name">
                <div class="card rv p-6">
                  <p class="mono text-sm text-[#929292]" x-text="t.name + '()'"></p>
                  <p class="display text-lg mt-2 mb-2" x-text="t.title"></p>
                  <p class="text-sm text-[#929292] leading-relaxed" x-text="t.desc"></p>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 5 · PRICING -->
        <section class="sec">
          <div class="deco deco-4"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Pay per call · x402 v2</div>
            <h2 class="h2 rv">0.05 USDT0.<br>No key. No gas.</h2>
            <p class="lede rv" style="margin-bottom:36px">
              Discovery is free forever — <code class="mono">initialize</code>,
              <code class="mono">tools/list</code>, and <code class="mono">get_quota</code> never cost
              a cent, so any agent can connect and budget before it spends. Every result is paid:
              the server answers <strong>HTTP&nbsp;402</strong> and the OKX facilitator settles
              0.05&nbsp;USDT0 on-chain. This server never touches a private key.
            </p>
            <div class="codeblk rv"><span class="c">// decoded PAYMENT-REQUIRED header</span>
{
  <span class="k">"x402Version"</span>: 2,
  <span class="k">"accepts"</span>: [{
    <span class="k">"scheme"</span>:  <span class="s">"exact"</span>,
    <span class="k">"network"</span>: <span class="s">"eip155:196"</span>,     <span class="c">// X Layer</span>
    <span class="k">"amount"</span>:  <span class="s">"50000"</span>,          <span class="c">// 0.05 USDT0</span>
    <span class="k">"asset"</span>:   <span class="s">"0x779ded0c…3736"</span>
  }]
}</div>
          </div>
        </section>

        <!-- 6 · HOW IT WORKS -->
        <section class="sec">
          <div class="deco deco-5"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Under the hood</div>
            <h2 class="h2 rv">Seven fetches.<br>Zero guesses.</h2>
            <div class="flex flex-col gap-6" style="margin-top:44px">
              <template x-for="(st,i) in steps" :key="i">
                <div class="step rv">
                  <div class="n" x-text="'0'+(i+1)"></div>
                  <div>
                    <p class="display text-xl mb-2" x-text="st.t"></p>
                    <p class="text-sm text-[#929292] leading-relaxed max-w-[68ch]" x-text="st.d"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 7 · HONESTY -->
        <section class="sec">
          <div class="deco deco-6"></div>
          <div class="wrapx">
            <div class="eyebrow rv">Things we refuse to do</div>
            <h2 class="h2 rv">Agents act on this.<br>So we don't lie.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" style="margin-top:36px">
              <template x-for="h in honesty" :key="h.t">
                <div class="card rv p-6">
                  <p class="display text-lg mb-2" x-text="h.t"></p>
                  <p class="text-sm text-[#929292] leading-relaxed" x-text="h.d"></p>
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- 8 · HUMAN LAYER -->
        <section id="wrap" class="sec">
          <div class="deco deco-7"></div>
          <div class="wrapx text-center">
            <div class="eyebrow rv">Bonus layer</div>
            <h2 class="h2 rv">And yes —<br>it roasts you.</h2>
            <p class="lede rv" style="margin:0 auto 36px">
              Ask for <code class="mono">roast: true</code> and the agent gets a shareable “Wrapped”
              slideshow to hand back to its human. Archetype, scores, portfolio, and a verdict
              nobody asked for.
            </p>

            <div class="rv flex w-full card overflow-hidden" style="max-width:560px;margin:0 auto;padding:6px;border-radius:100px">
              <input type="text" x-model="address" @keydown.enter="wrap()" placeholder="0x..."
                     class="flex-1 px-5 py-4 border-none outline-none text-base mono bg-transparent text-white placeholder-[#6a6a6a]">
              <button @click="wrap()" class="btn-primary px-8 rounded-full font-bold text-sm" style="border:none;cursor:pointer">Wrap</button>
            </div>
            <button @click="loadSample()" class="rv mono text-xs uppercase tracking-[.2em] text-[#929292] hover:text-white transition-colors" style="margin-top:22px">
              or see a sample wrap
            </button>
          </div>
        </section>

        <!-- 9 · FINAL CTA -->
        <section class="sec" style="border-bottom:none">
          <div class="deco deco-8"></div>
          <div class="wrapx flex flex-col items-center text-center">
            <h2 class="h2 rv" style="font-size:clamp(2.4rem,6.5vw,4.6rem)">Give your agent<br>a second opinion.</h2>
            <a href="https://www.okx.ai/agents/4938" target="_blank" rel="noopener" class="cta rv" style="margin-top:24px">
              Try WalletLens on OKX.AI <span>→</span>
            </a>
            <div class="rv mono text-[11px] uppercase tracking-[.2em] text-[#6a6a6a]" style="margin-top:28px">
              MCP endpoint · txwrap.my.id/mcp
            </div>
          </div>
        </section>

      </div>
    </template>

    <!-- ===== SLIDESHOW ===== -->
    <template x-if="wrapped && !loading">
      <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8 gap-5">

        <div id="card" class="w-full max-w-[560px] relative overflow-hidden"
             style="border:1px solid #262626;border-radius:24px"
             :style="`background:${themes[slide].bg};color:${themes[slide].ink};transition:background .45s ease;border:1px solid ${themes[slide].ink==='#ffffff'?'#262626':'#d9d9d9'};border-radius:24px`"
             @touchstart="touchStart($event)" @touchend="touchEnd($event)">

          <!-- decorative theme background -->
          <div class="deco" :class="['deco-'+slide, themes[slide].ink==='#ffffff' ? '' : 'inkd']"></div>

          <!-- progress ticks -->
          <div class="relative z-[1] flex gap-1.5 px-6 pt-6">
            <template x-for="n in totalSlides" :key="n">
              <div class="h-1 flex-1 rounded-full cursor-pointer" :style="`background:${(n-1)<=slide ? themes[slide].ink : (themes[slide].ink==='#ffffff' ? 'rgba(255,255,255,.15)' : 'rgba(0,0,0,.12)')}`" @click="go(n-1)"></div>
            </template>
          </div>

          <div class="relative z-[1] px-8 pb-10 pt-6 min-h-[560px] flex flex-col justify-center">

            <!-- 0: COVER -->
            <div x-show="slide===0" class="reveal" :class="slide===0&&'run'">
              <div class="flex flex-col items-center text-center gap-5">
                <div class="badge pop" :style="`background:${themes[slide].ink};color:${themes[slide].bg}`">Your <span x-text="year"></span> Wallet Wrapped</div>
                <h2 class="display pop" style="font-size:clamp(2.8rem,12vw,4.8rem)">YOUR YEAR<br>ONCHAIN</h2>
                <div class="pop mono px-4 py-2 text-sm break-all rounded-full" :style="`border:1px solid ${themes[slide].ink==='#ffffff'?'#262626':'#d9d9d9'}`" x-text="shortAddr(data.address)"></div>
                <p class="pop mono text-[11px] uppercase tracking-[.2em] opacity-60">X Layer · powered by WalletLens</p>
              </div>
            </div>

            <!-- 1: ARCHETYPE -->
            <div x-show="slide===1" class="reveal" :class="slide===1&&'run'">
              <div class="flex items-center gap-2 flex-wrap mb-6">
                <div class="badge pop" :style="`background:${themes[slide].ink};color:${themes[slide].bg}`">Your Wallet Archetype</div>
                <div class="badge pop" :style="`background:transparent;color:${themes[slide].ink};border:1px solid currentColor`" x-text="data.metrics.rarity + ' Rank'"></div>
                <div class="badge pop" x-show="data.metrics.percentile" :style="`background:transparent;color:${themes[slide].ink};border:1px solid currentColor`" x-text="'Top ' + (data.metrics.percentile?.topPercent ?? '') + '%'"></div>
              </div>
              <h2 class="display pop mb-6" style="font-size:clamp(2.2rem,9vw,3.8rem)" x-text="data.personality.title"></h2>
              <div class="card pop p-5 text-lg font-semibold leading-snug" :style="`background:transparent;border:1px solid ${themes[slide].ink==='#ffffff'?'#262626':'#d9d9d9'};color:${themes[slide].ink}`" x-text="data.personality.roast"></div>
            </div>

            <!-- 2: OVERVIEW -->
            <div x-show="slide===2" class="reveal" :class="slide===2&&'run'">
              <div class="badge pop mb-6" :style="`background:${themes[slide].ink};color:${themes[slide].bg}`">The Numbers</div>
              <div class="grid grid-cols-2 gap-3">
                <div class="card pop p-5" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-1">Balance</p><p class="display" style="font-size:clamp(1.4rem,6vw,2rem)"><span x-text="data.metrics.balanceEth"></span> <span class="text-sm" x-text="sym"></span></p></div>

            <!-- 4: SCORES -->

              <div class="flex flex-col gap-5">
                <template x-for="s in scoreData" :key="s.label">
                  <div class="pop">
                    <div class="flex justify-between items-end mb-2"><span class="mono text-xs uppercase tracking-[.14em] opacity-70" x-text="s.label"></span><span class="display text-2xl" x-text="s.value"></span></div>
                    <div class="bar-track"><div class="bar-fill" :style="`width:${slide===4 ? s.value : 0}%;background:${accent}`"></div></div>

            <!-- 5: FUN FACTS -->

              <div class="flex flex-col gap-3">
                <template x-for="(fact,i) in data.personality.funFacts" :key="i">
                  <div class="card pop p-4 flex gap-4 items-start" :style="`background:transparent;border:1px solid ${slideBorder}`">

                <div class="card pop p-4" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-1">Streak</p><p class="display" style="font-size:clamp(1.5rem,5.5vw,2rem)"><span x-text="data.metrics.activityStreak"></span><span class="text-base"> days</span></p></div>
                <div class="card pop p-4" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-1">Cross-chain</p><p class="display" style="font-size:clamp(1.5rem,5.5vw,2rem)"><span x-text="data.metrics.crossChain?.total ?? 0"></span><span class="text-base"> hops</span></p></div>
                <div class="card pop p-4" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-1">Contract Calls</p><p class="display" style="font-size:clamp(1.5rem,5.5vw,2rem)" x-text="data.metrics.internalTxCount ?? 0"></p></div>

              <div class="card pop p-4 mb-3" x-show="momentum" :style="`background:transparent;border:1px solid ${slideBorder}`">

                <div class="flex items-baseline justify-between gap-2 flex-wrap">
                  <p class="display" style="font-size:clamp(1.3rem,5vw,1.8rem)"><span x-text="momentum?.icon"></span> <span class="capitalize" x-text="momentum?.momentum"></span></p>
                  <p class="mono text-xs opacity-60"><span x-text="momentum?.tx7d"></span> txs 7d · <span x-text="momentum?.tx30d"></span> txs 30d</p>

                <template x-for="(c,i) in topCps" :key="c.address">
                  <div class="flex items-center justify-between gap-2 py-1.5" :style="i>0 ? `border-top:1px solid ${slideBorder}` : ''">

                    <span class="mono text-[10px] opacity-60" x-text="c.txCount + ' tx'"></span>

              <div class="card pop p-4" x-show="!topCps.length" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-1">Top Frenemy</p><p class="display text-lg" x-text="data.metrics.topFrenemyLabel"></p><p class="mono text-xs break-all opacity-60 mt-1" x-text="data.metrics.topFrenemy"></p></div>
            </div>

            <!-- 7: VERDICT -->

                <div class="pop text-2xl font-bold italic leading-snug" x-text="'&ldquo;'+data.personality.verdict+'&rdquo;'"></div>
                <p class="pop mono text-xs uppercase tracking-[.24em] opacity-60">— WalletLens Verdict</p>
              </div>
            </div>

            <!-- 8: SUMMARY -->
            <div x-show="slide===8" class="reveal" :class="slide===8&&'run'">
              <div class="badge pop mb-5" :style="`background:${themes[slide].ink};color:${themes[slide].bg}`">In Summary</div>
              <p class="display pop mb-2" style="font-size:clamp(1.5rem,6vw,2.2rem)" x-text="data.metrics.sarcasticTitle"></p>
              <p class="pop mono text-[10px] uppercase tracking-[.18em] opacity-60 mb-4" x-show="data.metrics.percentile" x-text="'Top ' + (data.metrics.percentile?.topPercent ?? '') + '% of ' + (data.metrics.percentile?.sampleSize ?? '') + ' wrapped wallets'"></p>
              <div class="grid grid-cols-4 gap-2 mb-4">
                <template x-for="s in scoreData" :key="s.label">
                  <div class="card pop p-3 text-center" :style="`background:transparent;border:1px solid ${slideBorder}`"><p class="mono text-[9px] uppercase opacity-60" x-text="s.label"></p><p class="display text-xl" x-text="s.value"></p></div>
                </template>
              </div>
              <div class="pop flex flex-wrap gap-1.5 mb-6">
                <template x-for="sig in signalChips" :key="sig">
                  <span class="mono text-[10px] uppercase px-2.5 py-1 rounded-full" :style="`border:1px solid ${slideBorder}`" x-text="sig"></span>
                </template>
              </div>
              <button @click="shareX()" class="pop w-full py-4 rounded-full font-bold text-sm cursor-pointer" :style="`background:${themes[slide].ink};color:${themes[slide].bg};border:none`">Share on X</button>
            </div>

          </div>

          <div class="marquee" :style="`color:${themes[slide].ink};opacity:.5;border-color:${slideBorder}`">
            <span>WALLETLENS · YOUR YEAR ONCHAIN · WALLETLENS · YOUR YEAR ONCHAIN · WALLETLENS · YOUR YEAR ONCHAIN ·&nbsp;</span><span>WALLETLENS · YOUR YEAR ONCHAIN · WALLETLENS · YOUR YEAR ONCHAIN · WALLETLENS · YOUR YEAR ONCHAIN ·&nbsp;</span>
          </div>
        </div>

        <!-- controls -->
        <div class="w-full max-w-[560px] flex justify-between items-center gap-3 flex-wrap">
          <div class="flex items-center gap-3">
            <button @click="prev()" :disabled="slide===0" class="btn w-12 h-12 text-xl flex items-center justify-center">←</button>
            <span class="mono text-sm text-[#929292]"><span x-text="slide+1"></span>/<span x-text="totalSlides"></span></span>
            <button @click="next()" :disabled="slide===totalSlides-1" class="btn w-12 h-12 text-xl flex items-center justify-center">→</button>
          </div>
          <div class="flex gap-2">
            <button @click="saveImage()" class="btn px-5 py-3 text-xs">Save Image</button>
            <button @click="reset()" class="btn px-5 py-3 text-xs">New Wrap</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script>
    function walletlens() {
      return {
        address: '',
        loading: false,
        wrapped: false,
        slide: 0,
        totalSlides: 9,
        year: new Date().getFullYear(),
        data: { address:'', metrics: null, personality: null },
        disp: { totalTx: 0, swaps: 0 },
        touchX: 0,
        accent: '#E85DC8', // OKX-style magenta, used sparingly for emphasis
        themes: [
          { bg:'#000000', ink:'#ffffff' }, // cover
          { bg:'#0d0d0d', ink:'#ffffff' }, // archetype
          { bg:'#000000', ink:'#ffffff' }, // overview
          { bg:'#0d0d0d', ink:'#ffffff' }, // portfolio
          { bg:'#000000', ink:'#ffffff' }, // scores
          { bg:'#0d0d0d', ink:'#ffffff' }, // fun facts
          { bg:'#000000', ink:'#ffffff' }, // habits
          { bg:'#0d0d0d', ink:'#ffffff' }, // verdict
          { bg:'#000000', ink:'#ffffff' }, // summary
        ],

        get slideBorder() { return '#2a2a2a'; },

        // ---- live usage counters ----
        statsReady: false,
        ds: { wraps: 0, agentCalls: 0, uniqueWallets: 0 },

        async loadStats() {
          try {
            const res = await fetch('/api/stats');
            if (!res.ok) return;
            const s = await res.json();
            // Only show the strip once there is something real to show.
            if (!s.wraps && !s.agentCalls) return;
            this.statsReady = true;
            this.$nextTick(() => {
              Object.keys(this.ds).forEach(k => this.tween('ds', k, s[k] || 0));
            });
          } catch { /* counters are decoration; never block the page */ }
        },

        tween(obj, key, target) {
          const start = performance.now(), dur = 1100;
          const step = now => {
            const t = Math.min(1, (now - start) / dur);
            this[obj][key] = Math.round((1 - Math.pow(1 - t, 3)) * target);
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        },

        // ---- landing page content ----
        signalList: [
          'nightOwl', 'approvalHeavy', 'likelyBot', 'dustPattern',
          'highSwapActivity', 'newWallet', 'dormant', 'whale',
          'diversifiedPortfolio', 'stablecoinHeavy', 'crossChainUser',
          'nftCollector', 'contractHeavy', 'reciprocalFlow',
        ],
        tools: [
          { name: 'profile_wallet', title: 'The full picture',
            desc: 'Archetype with confidence, activity breakdown, token portfolio, net worth, scores, signals, top counterparty, evidence.' },
          { name: 'screen_wallet', title: 'Risk, fast',
            desc: 'Coarse risk level plus the flags behind it: bot-like, dust-farming, approval-heavy, dormant, brand new.' },
          { name: 'compare_wallets', title: 'Rank a shortlist',
            desc: 'Two to five addresses, side by side. Pick the safest counterparty or spot the farmer in the set.' },
          { name: 'classify_wallet', title: 'Cheap check',
            desc: 'Just the archetype, confidence, rarity tier and active signals. For when you do not need the whole profile.' },
          { name: 'find_sybils', title: 'Spot the farm',
            desc: 'Screen 3–20 wallets for coordination: shared counterparties, shared funder, correlated timing. Clusters the sybils before you airdrop.' },
          { name: 'screen_wallets', title: 'Vet the allowlist',
            desc: 'Up to 20 wallets, one call: risk, verdict, momentum per wallet. Light mode — cheap enough to run on the whole list.' },
          { name: 'check_approvals', title: 'The drainer check',
            desc: 'Decodes recent approve() calldata: every spender, every allowance. Flags unlimited approvals and blocklisted spenders before they drain.' },
          { name: 'diff_wallet', title: 'What changed?',
            desc: 'Baseline on first call, delta on every call after: archetype flips, signals gained or lost, new txs, net-worth moves. Monitoring as a tool call.' },
          { name: 'expand_risk', title: 'Screen the circle',
            desc: 'The wallet looks clean — but who funds it? Light-screens its top counterparties both directions and verdicts the whole neighborhood.' },
          { name: 'get_quota', title: 'Budget first — free',
            desc: 'Live x402 pricing and payment status, free forever — so an agent can meter its spend before it commits to a paid call.' },
          { name: 'get_population', title: 'The population — free',
            desc: 'Archetype and score distributions across every wallet WalletLens has profiled — the exact population your percentile is measured against.' },
        ],
        steps: [
          { t: 'Fetch, in parallel', d: 'Seven X Layer Data API endpoints at once: balances, native transactions, ERC-20 holdings, NFT count, token transfer flows, internal contract calls, and cross-chain hops. Any supplementary endpoint may fail without taking the profile down.' },
          { t: 'Classify every transaction', d: 'The 4-byte method selector is chain-agnostic, so each transaction resolves to swap, approve, transfer, native send, or other contract call. No guessing.' },
          { t: 'Score, deterministically', d: 'The metrics engine is pure math. Archetype, scores, and all 14 signals fall out of thresholds you can read in the source.' },
          { t: 'Attach the evidence', d: 'Confidence scales with sample size and how decisively the wallet cleared a threshold — capped below certainty, because a recent-activity window can never prove one.' },
          { t: 'Roast, optionally', d: 'The AI layer only writes the human summary. It never touches a number.' },
        ],
        honesty: [
          { t: 'No fabricated percentiles', d: 'A "top X%" only appears once enough wallets have been profiled to mean it, and it is measured against wallets WalletLens has profiled — never claimed against all of X Layer.' },
          { t: 'Confidence is capped at 0.95', d: 'A recent-activity window cannot justify certainty, so we never claim it.' },
          { t: 'No guessed protocol names', d: 'Unknown addresses render as clean short hex instead of a plausible-looking lie.' },
          { t: 'The fee matches reality', d: 'A paid endpoint must actually settle. We charge 0.05 because x402 settlement genuinely works.' },
        ],

        initReveal() {
          this.loadStats();
          this.$nextTick(() => {
            const io = new IntersectionObserver((entries) => {
              entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('seen'); io.unobserve(e.target); }
              });
            }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
            document.querySelectorAll('.rv').forEach(el => io.observe(el));
          });
        },

        init() {
          this.$watch('slide', v => this.enter(v));
          window.addEventListener('keydown', e => {
            if (!this.wrapped) return;
            if (e.key === 'ArrowRight') this.next();
            if (e.key === 'ArrowLeft') this.prev();
          });
          const m = location.pathname.match(/\/wrap\/(0x[a-fA-F0-9]{40})/);
          const addr = m ? m[1] : new URLSearchParams(location.search).get('address');
          if (addr) { this.address = addr; this.$nextTick(() => this.wrap()); }
        },

        get sym() { return this.data.metrics?.tokenSymbol || 'OKB'; },

        get scoreData() {
          const m = this.data.metrics;
          if (!m) return [];
          return [
            { label: 'DeFi', value: m.defiScore },
            { label: 'Airdrop', value: m.airdropScore },
            { label: 'Degen', value: m.degenScore },
            { label: 'Whale', value: m.whaleometer },
          ];
        },

        get pf() { return this.data.metrics?.portfolio || {}; },
        get bag() { return (this.pf.topHoldings || []).slice(0, 5); },

        get momentum() {
          const t = this.data.metrics?.trajectory;
          if (!t) return null;
          const icon = { heating: '🔥', cooling: '🧊', steady: '➡️', dormant: '💤' }[t.momentum] || '';
          return { ...t, icon };
        },
        get topCps() { return (this.data.metrics?.topCounterparties || []).slice(0, 3); },

        get signalChips() {
          const s = this.data.metrics?.signals;
          if (!s) return [];
          return Object.entries(s).filter(([, v]) => v).map(([k]) =>
            k.replace(/([A-Z])/g, ' $1').trim()
          );
        },

        get activity() {
          const b = this.data.metrics?.activityBreakdown;
          if (!b) return [];
          return [
            { label: 'Swap', value: b.swap },
            { label: 'Approve', value: b.approve },
            { label: 'Transfer', value: b.transfer },
            { label: 'Native', value: b.native },
            { label: 'Other', value: b.other },
          ];
        },

        get peakHourLabel() {
          const h = this.data.metrics?.peakHour;
          if (h === undefined || h === null) return '';
          const ampm = h >= 12 ? 'PM' : 'AM';
          return (h % 12 || 12) + ':00 ' + ampm;
        },

        shortAddr(a) { return (!a || a.length < 16) ? (a || '') : a.slice(0, 10) + '...' + a.slice(-6); },

        enter(v) {
          if (v === 2) {
            this.countUp('totalTx', this.data.metrics.totalTx);
            this.countUp('swaps', this.data.metrics.swapCount);
          }
        },

        countUp(key, target) {
          const start = performance.now(), dur = 900;
          this.disp[key] = 0;
          const step = now => {
            const t = Math.min(1, (now - start) / dur);
            this.disp[key] = Math.round((1 - Math.pow(1 - t, 3)) * target);
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        },

        go(n) { this.slide = n; },
        prev() { if (this.slide > 0) this.slide--; },
        next() { if (this.slide < this.totalSlides - 1) this.slide++; },

        touchStart(e) { this.touchX = e.changedTouches[0].clientX; },
        touchEnd(e) {
          const dx = e.changedTouches[0].clientX - this.touchX;
          if (dx < -50) this.next();
          if (dx > 50) this.prev();
        },

        async wrap() {
          const addr = this.address.trim();
          if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
            alert('Please enter a valid 0x wallet address (42 characters)');
            return;
          }
          this.loading = true;
          try {
            const res = await fetch('/api/txwrap', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ address: addr }),
            });
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Request failed'); }
            const json = await res.json();
            this.data = json.data;
            // The API response nests everything under metrics and omits the
            // top-level address; carry the one we asked for so the cover and
            // summary slides can show it.
            if (!this.data.address) this.data.address = addr;
            this.slide = 0;
            this.wrapped = true;
            this.loading = false;
          } catch (e) {
            this.loading = false;
            alert('Error: ' + e.message);
          }
        },

        loadSample() {
          this.data = {
            address: '0x69c236e021f5775b0d0328ded5eac708e3b869df',
            metrics: {
              totalTx: 847, tokenSymbol: 'OKB', balanceEth: '12.4821', balanceUsd: '624.10',
              gasBurnedEth: '3.2140', gasBurnedUsd: '160.70', swapCount: 213, defiScore: 78,
              activityBreakdown: { swap: 213, approve: 47, transfer: 89, native: 61, other: 90 },
              portfolio: {
                tokenCount: 7, totalValueUsd: 1841.22, stablecoinValueUsd: 614.43, nftCount: 4,
                topHoldings: [
                  { symbol: 'USDT', amount: '614.05', valueUsd: 614.43 },
                  { symbol: 'WOKB', amount: '9.2', valueUsd: 460.00 },
                  { symbol: 'XDOG', amount: '128400', valueUsd: 385.20 },
                  { symbol: 'USDC', amount: '210.11', valueUsd: 210.15 },
                  { symbol: 'PT', amount: '1520', valueUsd: 171.44 },
                ],
              },
              tokenActivity: { transferCount: 96, uniqueTokens: 11, inbound: 41, outbound: 55, topToken: 'USDT' },
              internalTxCount: 132, crossChain: { total: 9, deposits: 5, withdrawals: 4 },
              netWorthUsd: '2465.32',
              airdropScore: 82, degenScore: 91, diamondHandsDays: 14, whaleometer: 67,
              uniqueProtocols: 19, topFrenemy: '0x8f3a9c2b1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f80',
              topFrenemyLabel: '0x8f3a…7f80', rarity: 'S-Tier',

                'You burned 3.21 OKB on gas — roughly 40 coffees you will never get back.',

        },

        scrollToWrap() {
          const el = document.getElementById('wrap');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        },

        reset() { this.wrapped = false; this.slide = 0; this.address = ''; },

        async saveImage() {
          const el = document.getElementById('card');
          if (!el) return;
          try {
            const canvas = await html2canvas(el, {
              scale: 2, useCORS: true, logging: false,
              backgroundColor: this.themes[this.slide].bg,
              onclone: (doc) => {
                // html2canvas re-triggers CSS animations in the clone, capturing
                // reveal elements at their opacity:0 start frame. Freeze them.
                doc.querySelectorAll('.pop').forEach(n => {
                  n.style.opacity = '1';
                  n.style.transform = 'none';
                  n.style.animation = 'none';
                });
                doc.querySelectorAll('.marquee > span').forEach(n => { n.style.animation = 'none'; });
              },
            });
            const link = document.createElement('a');
            link.download = 'walletlens-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (e) { alert('Failed to generate image: ' + e.message); }
        },

        shareX() {
          const url = window.location.href;
          const text = '📊 Check out my wallet wrap! 🎰\n\n' + url + '\n\n#OKXAI #WalletLens';
          window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'width=600,height=400');
        },
      };
    }
  </script>
